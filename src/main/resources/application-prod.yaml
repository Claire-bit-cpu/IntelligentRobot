# ============================================================
# 智能机器人 - 生产环境配置
# 使用方法：
#   1. 将此文件放在 jar 同级目录
#   2. 启动时指定：java -jar IntelligentRobot-0.0.1-SNAPSHOT.jar --spring.config.location=optional:file:./application-prod.yaml
#   3. 或通过环境变量覆盖配置
# ============================================================

spring:
  application:
    name: IntelligentRobot
  main:
    allow-circular-references: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000}
      lettuce:
        pool:
          max-active: 20
          max-idle: 20
          min-idle: 5
          max-wait: 5000

# 线程池配置（生产环境优化）
thread-pool:
  high-priority:
    core-size: 20
    max-size: 100
    queue-capacity: 2000
  low-priority:
    core-size: 10
    max-size: 50
    queue-capacity: 5000

# 限流配置
ratelimit:
  global-qps: 2000
  ip-qps: 200
  enabled: true

# 幂等性配置
idempotent:
  expire-seconds: 86400
  key-prefix: "feishu:event:idempotent:"

# 飞书配置
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  api-base-url: ${FEISHU_API_BASE_URL:https://open.feishu.cn/open-apis}
  token-buffer-seconds: 60
  encrypt-key: ${FEISHU_ENCRYPT_KEY:}
  approval-definition-code: ${FEISHU_APPROVAL_DEFINITION_CODE:}

# 通义千问 API
qianwen:
  api-key: ${QIANWEN_API_KEY:}
  api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
  model: ${QIANWEN_MODEL:qwen-turbo}
  max-diff-length: 8000

# GitHub 配置
github:
  token: ${GITHUB_TOKEN:}
  api-url: https://api.github.com
  webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
  webhook:
    auto-review: ${GITHUB_WEBHOOK_AUTO_REVIEW:true}
  repo-aliases: ${GITHUB_REPO_ALIASES:}
  admin-open-ids: ${GITHUB_ADMIN_OPEN_IDS:}
  developer-open-ids: ${GITHUB_DEVELOPER_OPEN_IDS:}
  deploy: ${GITHUB_DEPLOY:}

# GitLab 配置
gitlab:
  api-url: https://gitlab.com/api/v4
  token: ${GITLAB_TOKEN:}
  enabled: ${GITLAB_ENABLED:false}

# 高德天气 API
amap:
  key: ${AMAP_KEY:}

# 消息去重配置
dedup:
  window-ms: 30000
  cleanup-ms: 600000

# 模糊匹配配置
fuzzy-match:
  enabled: true
  threshold: 0.70
  max-suggestions: 3

# DevOps 配置
devops:
  ping-timeout-ms: 5000
  http-timeout-ms: 5000

# JIRA 配置
jira:
  url: ${JIRA_URL:https://your-domain.atlassian.net}
  username: ${JIRA_USERNAME:}
  api-token: ${JIRA_API_TOKEN:}
  enabled: ${JIRA_ENABLED:false}
  local-fallback-file: ./local_tasks.md

# Prometheus 配置
prometheus:
  url: http://localhost:9090
  enabled: false

# Grafana 配置
grafana:
  url: http://localhost:3000
  api-key: ${GRAFANA_API_KEY:}
  enabled: false

# Actuator 监控端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: false

# 服务器配置
server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /

# 日志配置（生产环境）
logging:
  level:
    root: INFO
    com.example.intelligentRobot: INFO
    com.example.intelligentRobot.client.FeishuClient: WARN
    com.example.intelligentRobot.client.GitHubClient: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  file:
    name: ./logs/intelligent-robot.log
    max-size: 100MB
    max-history: 30

# 通知配置
notification:
  db-path: ${NOTIFICATION_DB_PATH:./notification.db}
  default-chat-ids: ${NOTIFICATION_DEFAULT_CHAT_IDS:}
  noise-reduction-enabled: false

notification.dedup:
  window-seconds: 300

notification.batch:
  enabled: true
  window-seconds: 600
  threshold: 3

# 搜索引擎配置
search:
  index-path: ${SEARCH_INDEX_PATH:./search-index.db}
  sync-interval-ms: 7200000
  max-sync-messages-per-chat: 500
  startup-delay-ms: 60000
  api-call-delay-ms: 100
  sync-chat-ids: ${SEARCH_SYNC_CHAT_IDS:auto}
  sync-wiki-space-ids: ${SEARCH_SYNC_WIKI_SPACE_IDS:auto}

# 新成员入群欢迎配置
welcome:
  enabled: true
  template: |
    欢迎 {{name}} 加入本群！

    我是飞书智能机器人，可以帮助你提升研发效率。
    请@我，并输入 /help 查看我能为您提供的服务。
  batch-threshold: 2
  batch-template: |
    欢迎新成员加入本群：{{names}}

    我是飞书智能机器人，可以帮助你提升研发效率。
    请@我，并输入 /help 查看我能为您提供的服务。
  cooldown: 30000
  batch-window-ms: 3000

# AI 智能理解配置
ai:
  enabled: true
  system-prompt: ${AI_SYSTEM_PROMPT:}

# 敏感操作二次确认配置
confirm:
  token-expire-seconds: 300

# 上下文管理器配置
context:
  global-param-ttl-minutes: 5

# 任务状态存储配置
task:
  status:
    store: ${TASK_STATUS_STORE:redis}
    max-logs-length: 5000
  slow-threshold-ms: 3000
  monitor:
    chat-id: ${TASK_MONITOR_CHAT_ID:}
    push-interval-ms: 10000
  cleanup:
    enabled: true
    cron: 0 0/5 * * * *
    older-than-minutes: 60
