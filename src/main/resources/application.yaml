spring:
  application:
    name: IntelligentxtSystem

# 高德天气 API Key
amap:
  key: ${AMAP_KEY:}

# 飞书配置
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  api-base-url: ${FEISHU_API_BASE_URL:https://open.feishu.cn/open-apis}
  token-buffer-seconds: ${FEISHU_TOKEN_BUFFER_SECONDS:60}
  encrypt-key: ${FEISHU_ENCRYPT_KEY:}

# 通义千问 API
qianyu:
  api-key: ${QIANYU_API_KEY:}
  api-url: ${QIANYU_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
  model: ${QIANYU_MODEL:qwen-turbo}
  max-diff-length: ${QIANYU_MAX_DIFF_LENGTH:8000}

# GitHub 配置
github:
  token: ${GITHUB_TOKEN:}
  api-url: ${GITHUB_API_URL:https://api.github.com}

# 消息去重配置
dedup:
  window-ms: ${DEDUP_WINDOW_MS:30000}
  cleanup-ms: ${DEDUP_CLEANUP_MS:600000}

# DevOps 配置
devops:
  ping-timeout-ms: ${DEVOPS_PING_TIMEOUT_MS:5000}
  http-timeout-ms: ${DEVOPS_HTTP_TIMEOUT_MS:5000}

server:
  port: 8082

# 通知配置
notification:
  db-path: ${NOTIFICATION_DB_PATH:./notification.db}
  # 默认通知群聊 ID 列表（当数据库无配置时使用，逗号分隔）
  default-chat-ids: ${NOTIFICATION_DEFAULT_CHAT_IDS:}

# 搜索引擎配置（SQLite FTS5）
search:
  index-path: ${SEARCH_INDEX_PATH:./search-index.db}
  sync-interval-ms: ${SEARCH_SYNC_INTERVAL_MS:7200000}  # 全量同步间隔，默认2小时
  max-sync-messages-per-chat: ${SEARCH_MAX_SYNC_MESSAGES:500}  # 每个群聊最多同步消息数
  # 指定同步的群聊 ID 列表（为空则不同步任何群聊）
  sync-chat-ids: ${SEARCH_SYNC_CHAT_IDS:auto}
  # 指定同步的知识库空间 ID 列表（为空则不同步任何知识库）
  sync-wiki-space-ids: ${SEARCH_SYNC_WIKI_SPACE_IDS:auto}

# 通知配置（群聊配置已迁移到数据库 notification_chat_config 表，支持动态增删）
# 使用以下接口管理群聊配置：
# - GET  /api/notification/config/chats          查询所有群聊配置
# - POST /api/notification/config/chats          添加群聊配置
# - PUT  /api/notification/config/chats/{id}    更新群聊配置
# - DEL  /api/notification/config/chats/{id}    删除群聊配置
# - POST /api/notification/config/chats/{id}/enable  启用群聊
# - POST /api/notification/config/chats/{id}/disable 禁用群聊