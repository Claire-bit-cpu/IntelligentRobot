spring:
  application:
    name: IntelligentxtSystem
  main:
    allow-circular-references: true

# 高德天气 API Key
amap:
  key: ${AMAP_KEY:}

# 飞书配置
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  api-base-url: ${FEISHU_API_BASE_URL:https://open.feishu.cn/open-apis}
  token-buffer-seconds: ${FEISHU_TOKEN_BUFFER_SECONDS:60}
  encrypt-key: ${FEISHU_ENCRYPT_KEY:}
  # 审批定义 Code（在飞书开放平台 → 审批 → 对应审批流的「定义Code」）
  approval-definition-code: ${FEISHU_APPROVAL_DEFINITION_CODE:}

# 通义千问 API
qianyu:
  api-key: ${QIANYU_API_KEY:}
  api-url: ${QIANYU_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
  model: ${QIANYU_MODEL:qwen-turbo}
  max-diff-length: ${QIANYU_MAX_DIFF_LENGTH:8000}

# GitHub 配置
github:
  token: ${GITHUB_TOKEN:}
  api-url: ${GITHUB_API_URL:https://api.github.com}
  # Webhook 签名密钥（在 GitHub 仓库设置 → Webhooks → Secret 中配置）
  webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
  # 是否启用 Webhook 自动代码审查（push/PR 事件触发）
  webhook:
    auto-review: ${GITHUB_WEBHOOK_AUTO_REVIEW:true}
  # 仓库别名映射（别名 = owner/repo）
  repo-aliases:
    # test是别名
    test: Claire-bit-cpu/Test
    frontend: Claire-bit-cpu/frontend-repo
    backend: Claire-bit-cpu/backend-repo
  # 写权限白名单（飞书用户 Open ID，逗号分隔）
  # 该用户可以执行合并代码（Merge）、创建 Issue、修改仓库设置等（这些是有风险的操作）
  admin-open-ids: ${GITHUB_ADMIN_OPEN_IDS:}
  # 该用户拥有日常开发权限
  developer-open-ids: ${GITHUB_DEVELOPER_OPEN_IDS:}
  
  # GitHub Actions 部署配置
  # 用于 /deploy 指令触发 GitHub Actions 工作流
  # 格式：环境名:owner/repo:工作流文件名:分支名（多个环境用逗号分隔）
  deploy: "dev:Claire-bit-cpu/Test:deploy-dev.yml:develop,test:Claire-bit-cpu/Test:deploy-test.yml:test,staging:Claire-bit-cpu/Test:deploy-staging.yml:staging,prod:Claire-bit-cpu/Test:deploy-prod.yml:main"

# GitLab 配置
gitlab:
  api-url: ${GITLAB_API_URL:https://gitlab.com/api/v4}
  token: ${GITLAB_TOKEN:}
  enabled: ${GITLAB_ENABLED:false}

# 消息去重配置
dedup:
  window-ms: ${DEDUP_WINDOW_MS:30000}
  cleanup-ms: ${DEDUP_CLEANUP_MS:600000}

# DevOps 配置
devops:
  ping-timeout-ms: ${DEVOPS_PING_TIMEOUT_MS:5000}
  http-timeout-ms: ${DEVOPS_HTTP_TIMEOUT_MS:5000}

# GitHub Actions 部署配置
# 用于 /deploy 指令触发 GitHub Actions 工作流
# 需要配置 github.token 才能使用真实部署功能
# 注意：此配置块已合并到上方的 github 配置中，避免重复

# JIRA 配置
jira:
  url: ${JIRA_URL:https://your-domain.atlassian.net}
  username: ${JIRA_USERNAME:}
  api-token: ${JIRA_API_TOKEN:}
  enabled: ${JIRA_ENABLED:false}
  # 本地降级模式：当无法连接 JIRA 云服务时，任务记录到此文件
  local-fallback-file: ${JIRA_LOCAL_FALLBACK_FILE:./local_tasks.md}

# Prometheus 配置
prometheus:
  url: ${PROMETHEUS_URL:http://localhost:9090}
  enabled: ${PROMETHEUS_ENABLED:false}

# Grafana 配置
grafana:
  url: ${GRAFANA_URL:http://localhost:3000}
  api-key: ${GRAFANA_API_KEY:}
  enabled: ${GRAFANA_ENABLED:false}

server:
  port: 8082

# 通知配置
notification:
  db-path: ${NOTIFICATION_DB_PATH:./notification.db}
  # 默认通知群聊 ID 列表（当数据库无配置时使用，逗号分隔）
  default-chat-ids: ${NOTIFICATION_DEFAULT_CHAT_IDS:}

# 搜索引擎配置（SQLite FTS5）
search:
  index-path: ${SEARCH_INDEX_PATH:./search-index.db}
  sync-interval-ms: ${SEARCH_SYNC_INTERVAL_MS:7200000}  # 全量同步间隔，默认2小时
  max-sync-messages-per-chat: ${SEARCH_MAX_SYNC_MESSAGES:500}  # 每个群聊最多同步消息数
  # 指定同步的群聊 ID 列表（为空则不同步任何群聊）
  sync-chat-ids: ${SEARCH_SYNC_CHAT_IDS:auto}
  # 指定同步的知识库空间 ID 列表（为空则不同步任何知识库）
  sync-wiki-space-ids: ${SEARCH_SYNC_WIKI_SPACE_IDS:auto}

# 通知配置（群聊配置已迁移到数据库 notification_chat_config 表，支持动态增删）
# 使用以下接口管理群聊配置：
# - GET  /api/notification/config/chats          查询所有群聊配置
# - POST /api/notification/config/chats          添加群聊配置
# - PUT  /api/notification/config/chats/{id}    更新群聊配置
# - DEL  /api/notification/config/chats/{id}    删除群聊配置
# - POST /api/notification/config/chats/{id}/enable  启用群聊
# - POST /api/notification/config/chats/{id}/disable 禁用群聊

