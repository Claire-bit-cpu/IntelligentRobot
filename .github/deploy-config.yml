# 部署配置文件
# 使用方法：在 GitHub 仓库的 Settings > Variables 和 Settings > Secrets 中配置对应的值
# 此文件定义部署目标的结构和所需配置，实际敏感信息存储在 GitHub Secrets 中

# 默认部署目标配置
default:
  name: "默认服务器"
  description: "默认部署目标"
  # 部署脚本模板（实际脚本在 GitHub Actions 工作流中执行）
  deploy:
    # SSH 连接信息（从 GitHub Variables/Secrets 读取）
    ssh_host: ${{ vars.DEPLOY_DEFAULT_HOST }}
    ssh_user: ${{ vars.DEPLOY_DEFAULT_USER }}
    ssh_key: ${{ secrets.DEPLOY_DEFAULT_SSH_KEY }}
    # 部署路径
    remote_path: ${{ vars.DEPLOY_DEFAULT_PATH || '/app' }}
    # 部署命令（根据实际情况修改）
    commands:
      - "cd ${{ vars.DEPLOY_DEFAULT_PATH || '/app' }}"
      - "git pull origin main"
      - "npm install --production"
      - "pm2 restart app || pm2 start app.js --name app"
  # 健康检查配置
  health_check:
    enabled: true
    url: ${{ vars.DEPLOY_DEFAULT_HEALTH_URL || 'http://localhost:3000/health' }}
    timeout: 30
  # 所需 GitHub Variables（非敏感配置）
  required_variables:
    - name: DEPLOY_DEFAULT_HOST
      description: "默认服务器 SSH 主机地址"
      required: true
    - name: DEPLOY_DEFAULT_USER
      description: "默认服务器 SSH 用户名"
      required: true
    - name: DEPLOY_DEFAULT_PATH
      description: "默认服务器部署路径（可选，默认 /app）"
      required: false
    - name: DEPLOY_DEFAULT_HEALTH_URL
      description: "健康检查 URL（可选）"
      required: false
  # 所需 GitHub Secrets（敏感信息）
  required_secrets:
    - name: DEPLOY_DEFAULT_SSH_KEY
      description: "默认服务器 SSH 私钥"
      required: true

